<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Glassmorphism Login Form</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>

    <div class="wrapper">
        <h1>Login</h1>
        <div class="input-box">
            <input type="text" id="username" placeholder="Username" required>
            <i class="fas fa-user"></i>
        </div>
        <div class="input-box">
            <input type="password" id="password" placeholder="Password" required>
            <i class="fas fa-lock"></i>
        </div>

        <div class="remember-forgot">
            <label><input type="checkbox" id="remember">Remember me</label>
            <a href="#">Forgot password?</a>
        </div>

        <button class="btn" onclick="login()">Login</button>
        <button class="btn" style="margin-top:10px;background:#eee;" onclick="register()">Register</button>

        <div class="register-link">
            <p>Don't have an account? <a href="#">Register</a></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
